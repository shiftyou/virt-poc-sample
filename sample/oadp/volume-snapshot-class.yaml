apiVersion: snapshot.storage.k8s.io/v1
deletionPolicy: Delete
driver: hspc.csi.hitachi.com
kind: VolumeSnapshotClass
metadata:
  labels:
    velero.io/csi-volumesnapshot-class: "true"  # This part is important
  name: snapshotclass-vm-sc
parameters:
