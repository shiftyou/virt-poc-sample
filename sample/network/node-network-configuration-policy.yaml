apiVersion: nmstate.io/v1
kind: NodeNetworkConfigurationPolicy
metadata:
  name: ovs-br1-multiple-networks
spec:
  desiredState:
    interfaces:
      - bridge:
          options:
            stp: true
          port:
            - name: bond1
        description: |-
          A dedicated OVS bridge with bond1 as a port
          allowing all VLANs and untagged traffic
        name: ovs-br1
        state: up
        type: ovs-bridge
    ovn:
      bridge-mappings:
        - bridge: ovs-br1
          localnet: localnet1
          state: present
        - bridge: ovs-br1
          localnet: localnet2
          state: present
        - bridge: ovs-br1
          localnet: localnet3
          state: present
