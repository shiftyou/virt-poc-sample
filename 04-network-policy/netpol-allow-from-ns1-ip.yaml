# =============================================================================
# [NetworkPolicy] poc-netpol-2 — NS1 VM IP 허용
#
# poc-netpol-1 의 VM IP를 확인한 후 아래 cidr 값을 실제 IP로 수정하여 적용하세요.
#
# VM IP 확인:
#   oc get vmi -n poc-netpol-1 -o jsonpath='{.items[*].status.interfaces[0].ipAddress}'
#
# 적용:
#   oc apply -f netpol-allow-from-ns1-ip.yaml
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-ns1-vm-ip
  namespace: poc-netpol-2
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - ipBlock:
            cidr: 192.168.0.1/32    # ← poc-netpol-1 VM IP로 교체
