apiVersion: console.openshift.io/v1
kind: ConsoleYAMLSample
metadata:
  name: poc-custom-image-datasource
spec:
  title: "POC 커스텀 이미지 DataSource 등록"
  description: "업로드 완료된 커스텀 이미지를 Virtualization UI에 등록합니다. DataVolume 임포트 완료 후 적용하세요. 등록 후 VM 생성 시 'From catalog'에서 이미지를 선택할 수 있습니다."
  targetResource:
    apiVersion: cdi.kubevirt.io/v1beta1
    kind: DataSource
  yaml: |
    # =============================================================================
    # [Console YAML Sample] 커스텀 이미지 DataSource 등록
    # OpenShift Console > + 버튼 (Import YAML) 에서 붙여넣기 후 사용
    #
    # DataVolume 임포트가 완료된 후 이 DataSource를 생성하세요.
    # =============================================================================
    apiVersion: cdi.kubevirt.io/v1beta1
    kind: DataSource
    metadata:
      name: my-custom-os
      namespace: openshift-virtualization-os-images
      labels:
        app: custom-os-image
    spec:
      source:
        pvc:
          namespace: openshift-virtualization-os-images
          name: my-custom-os-dv
