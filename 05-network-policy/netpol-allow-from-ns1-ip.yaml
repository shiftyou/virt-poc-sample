# =============================================================================
# [NetworkPolicy] poc-network-policy-2 — NS1 VM IP 허용
#
# poc-network-policy-1 VM IP 확인:
#   oc get vmi -n poc-network-policy-1 \
#     -o jsonpath='{.items[0].status.interfaces[0].ipAddress}'
#
# IP 수정 후 적용:
#   oc apply -f netpol-allow-from-ns1-ip.yaml
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-ns1-vm-ip
  namespace: poc-network-policy-2
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - ipBlock:
            cidr: 192.168.0.1/32    # ← poc-network-policy-1 VM IP로 교체
