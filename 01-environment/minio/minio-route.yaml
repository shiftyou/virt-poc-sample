# =============================================================================
# MinIO Route - 외부 접근용 Route
# MinIO S3 API와 Console에 대한 외부 접근을 허용합니다.
#
# 적용: oc apply -f minio-route.yaml
# =============================================================================

# MinIO S3 API Route
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: minio
  namespace: poc-minio
  labels:
    app: minio
spec:
  to:
    kind: Service
    name: minio
  port:
    targetPort: s3
  # HTTP 사용 (airgap 내부 환경)
  # HTTPS가 필요하면 tls 섹션 추가
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect

---

# MinIO Console Route
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: minio-console
  namespace: poc-minio
  labels:
    app: minio
spec:
  to:
    kind: Service
    name: minio-console
  port:
    targetPort: console
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
