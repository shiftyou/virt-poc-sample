# =============================================================================
# [Console YAML Sample] NetworkAttachmentDefinition - Linux Bridge
# OpenShift Console > + 버튼 (Import YAML) 에서 붙여넣기 후 사용
#
# 주의: br1을 실제 Bridge 이름으로, poc-nad를 실제 네임스페이스로 변경하세요.
# =============================================================================
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: poc-bridge-nad
  namespace: poc-nad
  annotations:
    k8s.v1.cni.cncf.io/resourceName: bridge.network.kubevirt.io/br1
spec:
  config: '{
    "cniVersion": "0.3.1",
    "name": "poc-bridge-nad",
    "type": "cnv-bridge",
    "bridge": "br1",
    "macspoofchk": true,
    "ipam": {}
  }'
