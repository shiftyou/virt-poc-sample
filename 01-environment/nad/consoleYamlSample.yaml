apiVersion: console.openshift.io/v1
kind: ConsoleYAMLSample
metadata:
  name: poc-nad-bridge
spec:
  title: "POC Bridge NetworkAttachmentDefinition"
  description: "Linux Bridge(${BRIDGE_NAME}) 기반 보조 네트워크를 VM에 연결하기 위한 NAD 정의입니다. NNCP로 생성된 브리지를 VM이 사용할 수 있게 합니다."
  targetResource:
    apiVersion: k8s.cni.cncf.io/v1
    kind: NetworkAttachmentDefinition
  yaml: |
    # =============================================================================
    # [Console YAML Sample] NetworkAttachmentDefinition - Linux Bridge
    # OpenShift Console > + 버튼 (Import YAML) 에서 붙여넣기 후 사용
    # 참조 변수: BRIDGE_NAME=${BRIDGE_NAME}, NAD_NAMESPACE=${NAD_NAMESPACE}
    # =============================================================================
    apiVersion: k8s.cni.cncf.io/v1
    kind: NetworkAttachmentDefinition
    metadata:
      name: poc-bridge-nad
      namespace: ${NAD_NAMESPACE}
      annotations:
        k8s.v1.cni.cncf.io/resourceName: bridge.network.kubevirt.io/${BRIDGE_NAME}
    spec:
      config: '{
        "cniVersion": "0.3.1",
        "name": "poc-bridge-nad",
        "type": "cnv-bridge",
        "bridge": "${BRIDGE_NAME}",
        "macspoofchk": true,
        "ipam": {}
      }'
