# =============================================================================
# PrometheusRule - VM 모니터링 Alert 규칙
# VM의 CPU, Memory, 상태 이상을 감지하는 Alert를 정의합니다.
#
# 적용: oc apply -f prometheusrule.yaml
# =============================================================================
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: poc-vm-alerts
  namespace: poc-alerts
  labels:
    # openshift-monitoring Prometheus가 이 규칙을 로드하도록 하는 레이블
    role: alert-rules
spec:
  groups:
    # VM 상태 Alert 그룹
    - name: poc-vm-status
      interval: 30s
      rules:
        # VM이 오랫동안 Pending 상태인 경우
        - alert: VMPendingTooLong
          expr: |
            kubevirt_vmi_phase_count{phase="Pending"} > 0
          for: 5m
          labels:
            severity: warning
            namespace: poc-alerts
          annotations:
            summary: "VM이 5분 이상 Pending 상태입니다"
            description: "VM {{ $labels.name }} (namespace: {{ $labels.namespace }})이 Pending 상태입니다."

        # VM이 오랫동안 Running이 아닌 경우
        - alert: VMNotRunning
          expr: |
            kubevirt_vmi_phase_count{phase!="Running"} > 0
          for: 10m
          labels:
            severity: warning
            namespace: poc-alerts
          annotations:
            summary: "VM이 Running 상태가 아닙니다"
            description: "VM {{ $labels.name }}의 상태: {{ $labels.phase }}"

    # VM CPU Alert 그룹
    - name: poc-vm-cpu
      interval: 60s
      rules:
        # VM CPU 사용률 90% 초과
        - alert: VMHighCPUUsage
          expr: |
            rate(kubevirt_vmi_cpu_usage_seconds_total[5m]) > 0.9
          for: 5m
          labels:
            severity: warning
            namespace: poc-alerts
          annotations:
            summary: "VM CPU 사용률이 90%를 초과했습니다"
            description: "VM {{ $labels.name }} CPU 사용률: {{ $value | humanizePercentage }}"

    # VM Memory Alert 그룹
    - name: poc-vm-memory
      interval: 60s
      rules:
        # VM 메모리 사용량이 할당량의 90% 초과
        - alert: VMHighMemoryUsage
          expr: |
            kubevirt_vmi_memory_used_bytes / kubevirt_vmi_memory_available_bytes > 0.9
          for: 5m
          labels:
            severity: warning
            namespace: poc-alerts
          annotations:
            summary: "VM 메모리 사용률이 90%를 초과했습니다"
            description: "VM {{ $labels.name }} 메모리 사용량: {{ $value | humanizePercentage }}"

    # 노드 Alert 그룹
    - name: poc-node-alerts
      interval: 60s
      rules:
        # 노드 CPU 사용률 80% 초과
        - alert: NodeHighCPUUsage
          expr: |
            100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
          for: 5m
          labels:
            severity: warning
            namespace: poc-alerts
          annotations:
            summary: "노드 CPU 사용률이 80%를 초과했습니다"
            description: "노드 {{ $labels.instance }} CPU 사용률: {{ $value | humanize }}%"

        # 노드 메모리 사용률 85% 초과
        - alert: NodeHighMemoryUsage
          expr: |
            (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
          for: 5m
          labels:
            severity: warning
            namespace: poc-alerts
          annotations:
            summary: "노드 메모리 사용률이 85%를 초과했습니다"
            description: "노드 {{ $labels.instance }} 메모리 사용률: {{ $value | humanize }}%"

        # 노드 디스크 사용률 80% 초과
        - alert: NodeDiskUsageHigh
          expr: |
            (1 - (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"})) * 100 > 80
          for: 5m
          labels:
            severity: warning
            namespace: poc-alerts
          annotations:
            summary: "노드 디스크 사용률이 80%를 초과했습니다"
            description: "노드 {{ $labels.instance }} 디스크 사용률: {{ $value | humanize }}%"
