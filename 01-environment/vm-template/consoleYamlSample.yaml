# =============================================================================
# [Console YAML Sample] VM Template
# OpenShift Console > + 버튼 (Import YAML) 에서 붙여넣기 후 사용
# openshift 네임스페이스를 선택하면 전체 클러스터에서 사용 가능
# =============================================================================
apiVersion: template.openshift.io/v1
kind: Template
metadata:
  name: poc-rhel9-vm-template
  namespace: openshift
  labels:
    template.kubevirt.io/type: vm
    os.template.kubevirt.io/rhel9.0: "true"
  annotations:
    description: "POC RHEL9 VM 템플릿"
    openshift.io/display-name: "POC RHEL9 VM Template"
parameters:
  - name: NAME
    description: "VM 이름"
    required: true
  - name: NAMESPACE
    description: "VM 네임스페이스"
    required: true
  - name: CPU_CORES
    value: "2"
  - name: MEMORY
    value: "4Gi"
  - name: DISK_SIZE
    value: "30Gi"
  - name: STORAGE_CLASS
    value: "ocs-storagecluster-ceph-rbd-virtualization"
objects:
  - apiVersion: kubevirt.io/v1
    kind: VirtualMachine
    metadata:
      name: "${NAME}"
      namespace: "${NAMESPACE}"
      labels:
        app: "${NAME}"
    spec:
      running: false
      template:
        metadata:
          labels:
            kubevirt.io/domain: "${NAME}"
        spec:
          domain:
            cpu:
              cores: ${{CPU_CORES}}
              sockets: 1
              threads: 1
            devices:
              disks:
                - name: rootdisk
                  disk:
                    bus: virtio
                - name: cloudinitdisk
                  disk:
                    bus: virtio
              interfaces:
                - name: default
                  masquerade: {}
            resources:
              requests:
                memory: "${MEMORY}"
          networks:
            - name: default
              pod: {}
          volumes:
            - name: rootdisk
              dataVolume:
                name: "${NAME}-rootdisk"
            - name: cloudinitdisk
              cloudInitNoCloud:
                userData: |
                  #cloud-config
                  user: cloud-user
                  password: redhat123
                  chpasswd: { expire: False }
      dataVolumeTemplates:
        - apiVersion: cdi.kubevirt.io/v1beta1
          kind: DataVolume
          metadata:
            name: "${NAME}-rootdisk"
          spec:
            sourceRef:
              kind: DataSource
              name: rhel9
              namespace: openshift-virtualization-os-images
            storage:
              resources:
                requests:
                  storage: "${DISK_SIZE}"
              storageClassName: "${STORAGE_CLASS}"
