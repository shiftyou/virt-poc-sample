# =============================================================================
# Self Node Remediation 설정
# 노드가 스스로 재시작하여 장애에서 복구합니다.
#
# 적용: oc apply -f snr-config.yaml
# =============================================================================

# SelfNodeRemediationConfig: SNR 전역 설정
apiVersion: self-node-remediation.medik8s.io/v1alpha1
kind: SelfNodeRemediationConfig
metadata:
  name: self-node-remediation-config
  namespace: openshift-workload-availability
spec:
  # 안전한 재시작 전략
  # SafeRebootStrategy: API 서버가 응답하면 안전하게 재시작
  # ResourceDeletion: API 서버가 응답하지 않으면 리소스 삭제 방식으로 복구
  safeTimeToAssumeNodeRebootedSeconds: 180
  # 피어 노드 확인 횟수 (API 서버 접근 불가 시)
  maxApiErrorThreshold: 3
  # 피어 노드와의 통신 타임아웃 (초)
  peerDialTimeout: 5
  # 피어 응답 타임아웃 (초)
  peerRequestTimeout: 5
  # 피어 업데이트 간격 (초)
  peerUpdateInterval: 15
  # API 서버 확인 간격 (초)
  apiServerTimeout: 5
  # API 서버 확인 횟수
  apiServerCheckInterval: 15

---

# SelfNodeRemediationTemplate: Node Health Check에서 참조하는 템플릿
apiVersion: self-node-remediation.medik8s.io/v1alpha1
kind: SelfNodeRemediationTemplate
metadata:
  name: self-node-remediation-template
  namespace: openshift-workload-availability
spec:
  template:
    spec:
      # 재시작 전략
      # Automatic: 상황에 따라 자동 선택 (권장)
      # ResourceDeletion: 리소스 삭제 후 복구 (API 서버 접근 가능 시)
      # OutOfServiceTaint: OutOfService 테인트 적용 (Kubernetes 1.26+)
      remediationStrategy: Automatic
