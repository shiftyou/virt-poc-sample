apiVersion: console.openshift.io/v1
kind: ConsoleYAMLSample
metadata:
  name: poc-snr-template
spec:
  title: "POC Self Node Remediation Template"
  description: "노드가 스스로 재시작하여 장애에서 복구하는 SNR 템플릿입니다. Node Health Check(NHC)와 함께 사용하세요."
  targetResource:
    apiVersion: self-node-remediation.medik8s.io/v1alpha1
    kind: SelfNodeRemediationTemplate
  yaml: |
    # =============================================================================
    # [Console YAML Sample] SelfNodeRemediationTemplate
    # OpenShift Console > + 버튼 (Import YAML) 에서 붙여넣기 후 사용
    # =============================================================================
    apiVersion: self-node-remediation.medik8s.io/v1alpha1
    kind: SelfNodeRemediationTemplate
    metadata:
      name: self-node-remediation-template
      namespace: openshift-workload-availability
    spec:
      template:
        spec:
          remediationStrategy: Automatic
---
apiVersion: console.openshift.io/v1
kind: ConsoleYAMLSample
metadata:
  name: poc-node-health-check
spec:
  title: "POC NodeHealthCheck (NHC)"
  description: "워커 노드의 Ready 조건을 모니터링하여 5분 이상 비정상 시 SNR 복구를 트리거합니다. SNR Template이 먼저 생성되어 있어야 합니다."
  targetResource:
    apiVersion: remediation.medik8s.io/v1alpha1
    kind: NodeHealthCheck
  yaml: |
    # =============================================================================
    # [Console YAML Sample] NodeHealthCheck (NHC)
    # OpenShift Console > + 버튼 (Import YAML) 에서 붙여넣기 후 사용
    # SNR Template이 먼저 생성되어 있어야 합니다.
    # =============================================================================
    apiVersion: remediation.medik8s.io/v1alpha1
    kind: NodeHealthCheck
    metadata:
      name: node-health-check
    spec:
      selector:
        matchExpressions:
          - key: node-role.kubernetes.io/worker
            operator: Exists
      unhealthyConditions:
        - type: Ready
          status: "False"
          duration: 300s
        - type: Ready
          status: Unknown
          duration: 300s
      remediationTemplate:
        apiVersion: self-node-remediation.medik8s.io/v1alpha1
        kind: SelfNodeRemediationTemplate
        name: self-node-remediation-template
        namespace: openshift-workload-availability
