# =============================================================================
# NetworkPolicy - Deny All (기본 차단 정책)
#
# 두 네임스페이스 모두에 Deny-All Ingress/Egress 정책을 적용합니다.
# 이 정책 적용 후 네임스페이스 간 모든 트래픽이 차단됩니다.
#
# 적용: oc apply -f networkpolicy-deny-all.yaml
# =============================================================================

# poc-network-policy1 - 모든 인바운드 차단
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-all-ingress
  namespace: poc-network-policy1
spec:
  podSelector: {}
  policyTypes:
    - Ingress

---

# poc-network-policy1 - 모든 아웃바운드 차단
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-all-egress
  namespace: poc-network-policy1
spec:
  podSelector: {}
  policyTypes:
    - Egress

---

# poc-network-policy2 - 모든 인바운드 차단
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-all-ingress
  namespace: poc-network-policy2
spec:
  podSelector: {}
  policyTypes:
    - Ingress

---

# poc-network-policy2 - 모든 아웃바운드 차단
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-all-egress
  namespace: poc-network-policy2
spec:
  podSelector: {}
  policyTypes:
    - Egress
