# =============================================================================
# NetworkPolicy - poc-network-policy2 에서 network-policy1-vm IP 허용
#
# network-policy1-vm 의 IP에서 poc-network-policy2 로 들어오는 트래픽을 허용합니다.
# 단방향 허용이므로, policy1-vm → policy2-vm ping은 가능하지만
# policy2-vm → policy1-vm ping은 불가능합니다.
#
# 사용법:
#   # 1. network-policy1-vm 의 IP 확인
#   NS1_VM_IP=$(oc get vmi network-policy1-vm -n poc-network-policy1 \
#     -o jsonpath='{.status.interfaces[0].ipAddress}')
#   echo "network-policy1-vm IP: $NS1_VM_IP"
#
#   # 2. 환경변수 설정 후 적용
#   NETWORK_POLICY1_VM_IP=${NS1_VM_IP} envsubst < networkpolicy-allow-from-ns1.yaml | oc apply -f -
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-ns1-vm
  namespace: poc-network-policy2
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - ipBlock:
            cidr: ${NETWORK_POLICY1_VM_IP}/32
