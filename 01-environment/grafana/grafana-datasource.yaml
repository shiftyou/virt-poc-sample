# =============================================================================
# Grafana Prometheus Datasource 설정
# OpenShift 내장 Prometheus(Thanos Querier)를 데이터 소스로 연결합니다.
#
# 사전 조건:
#   oc adm policy add-cluster-role-to-user cluster-monitoring-view \
#     -z grafana-serviceaccount -n poc-grafana
#
# 적용: oc apply -f grafana-datasource.yaml
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasource
  namespace: poc-grafana
  labels:
    app: grafana
    # Grafana가 자동으로 datasource를 로드하도록 하는 레이블
    grafana_datasource: "1"
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        # OpenShift Thanos Querier 엔드포인트
        url: https://thanos-querier.openshift-monitoring.svc.cluster.local:9091
        # ServiceAccount 토큰으로 인증
        jsonData:
          httpMethod: GET
          tlsSkipVerify: true
          httpHeaderName1: "Authorization"
        secureJsonData:
          # 다음 명령으로 토큰 값을 확인하여 교체:
          # oc serviceaccounts get-token grafana-serviceaccount -n poc-grafana
          httpHeaderValue1: "Bearer <REPLACE_WITH_SA_TOKEN>"
        isDefault: true
        editable: true
