# =============================================================================
# Grafana Deployment
# OpenShift Virtualization VM 메트릭 모니터링용 Grafana
#
# 참조 변수: GRAFANA_ADMIN_PASS (env.conf)
# 적용: envsubst < grafana-deploy.yaml | oc apply -f -
# =============================================================================

# Grafana 네임스페이스
apiVersion: v1
kind: Namespace
metadata:
  name: poc-grafana
  labels:
    app: grafana

---

# Prometheus 접근용 ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: grafana-serviceaccount
  namespace: poc-grafana

---

# Grafana 인증 정보 Secret
apiVersion: v1
kind: Secret
metadata:
  name: grafana-admin-credentials
  namespace: poc-grafana
type: Opaque
stringData:
  admin-user: admin
  admin-password: "${GRAFANA_ADMIN_PASS}"

---

# Grafana 설정 ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-config
  namespace: poc-grafana
data:
  grafana.ini: |
    [server]
    root_url = %(protocol)s://%(domain)s/
    [auth]
    disable_login_form = false
    [auth.anonymous]
    enabled = false
    [log]
    mode = console
    level = info

---

# Grafana Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: poc-grafana
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      serviceAccountName: grafana-serviceaccount
      containers:
        - name: grafana
          # airgap 환경에서는 미러 레지스트리 경로로 변경
          image: grafana/grafana:latest
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: grafana-admin-credentials
                  key: admin-user
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-admin-credentials
                  key: admin-password
            # 플러그인 없이 설치 (airgap 환경)
            - name: GF_INSTALL_PLUGINS
              value: ""
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: grafana-config
              mountPath: /etc/grafana/grafana.ini
              subPath: grafana.ini
            - name: grafana-storage
              mountPath: /var/lib/grafana
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: grafana-config
          configMap:
            name: grafana-config
        - name: grafana-storage
          emptyDir: {}

---

# Grafana Service
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: poc-grafana
  labels:
    app: grafana
spec:
  selector:
    app: grafana
  ports:
    - name: http
      port: 3000
      targetPort: 3000

---

# Grafana Route
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: grafana
  namespace: poc-grafana
  labels:
    app: grafana
spec:
  to:
    kind: Service
    name: grafana
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
