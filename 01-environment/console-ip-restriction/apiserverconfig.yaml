# =============================================================================
# APIServer - Console 및 API 접근 IP 제한
# 특정 CIDR 범위의 IP만 API 서버 및 Console에 접근할 수 있도록 제한합니다.
#
# 경고: 현재 접속 IP가 CONSOLE_ALLOWED_CIDRS에 포함되어 있는지 확인 후 적용하세요!
#
# 참조 변수: CONSOLE_ALLOWED_CIDRS, API_ALLOWED_CIDRS (env.conf)
# 적용: envsubst < apiserverconfig.yaml | oc apply -f -
# =============================================================================
apiVersion: config.openshift.io/v1
kind: APIServer
metadata:
  name: cluster
spec:
  # API 서버 접근 허용 CIDR 목록
  # 이 범위 외의 IP에서는 API 서버에 접근할 수 없습니다.
  # 쉼표로 구분된 CIDR 목록 (예: "10.0.0.0/8,192.168.0.0/16")
  # 주의: 클러스터 내부 노드 IP 범위도 포함해야 함
  clientCA:
    name: ""
  # 허용할 IP CIDR 범위
  # 환경 변수 ${API_ALLOWED_CIDRS}로 설정
  servingCerts: {}

---
# Console Route에 IP 필터 적용
# HAProxy Router에 whitelist annotation 추가
# Console Route는 openshift-console 네임스페이스에 있습니다
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: console
  namespace: openshift-console
  annotations:
    # haproxy.router.openshift.io/ip_whitelist: 허용할 IP CIDR (공백으로 구분)
    # CONSOLE_ALLOWED_CIDRS 값을 공백으로 변환 (쉼표 → 공백)
    haproxy.router.openshift.io/ip_whitelist: "${CONSOLE_ALLOWED_CIDRS}"
