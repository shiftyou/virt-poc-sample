# =============================================================================
# FenceAgentsRemediationTemplate - IPMI 기반 노드 Fencing 설정
# 노드 장애 시 IPMI를 통해 물리 서버를 재시작합니다.
#
# 참조 변수: FENCE_AGENT_IP, FENCE_AGENT_USER, FENCE_AGENT_PASS (env.conf)
# 적용: envsubst < far-config.yaml | oc apply -f -
# =============================================================================
apiVersion: fence-agents-remediation.medik8s.io/v1alpha1
kind: FenceAgentsRemediationTemplate
metadata:
  name: fence-agents-remediation-template
  # FAR Operator가 설치된 네임스페이스
  namespace: openshift-workload-availability
spec:
  template:
    spec:
      # 사용할 Fence Agent (fence_ipmilan: IPMI 기반 fencing)
      agent: fence_ipmilan
      # 모든 노드에 공통으로 적용되는 파라미터
      sharedparameters:
        # IPMI 서버 IP 주소
        --ip: "${FENCE_AGENT_IP}"
        # IPMI 사용자 이름
        --username: "${FENCE_AGENT_USER}"
        # IPMI 비밀번호
        --password: "${FENCE_AGENT_PASS}"
        # IPMI v2.0 RMCP+ 프로토콜 사용
        --lanplus: ""
        # Fencing 동작: reboot (재시작)
        --action: "reboot"
      # 노드별 개별 파라미터 (노드 이름 → IPMI IP 매핑)
      # 각 노드의 BMC IP를 실제 IP로 변경하세요
      nodeparameters:
        worker-0:
          --ipport: "623"
        worker-1:
          --ipport: "623"
        worker-2:
          --ipport: "623"
