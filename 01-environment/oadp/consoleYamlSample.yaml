apiVersion: console.openshift.io/v1
kind: ConsoleYAMLSample
metadata:
  name: poc-oadp-dpa
spec:
  title: "POC OADP DataProtectionApplication"
  description: "MinIO(${MINIO_ENDPOINT})를 S3 백엔드로 사용하는 OADP 백업 설정입니다. cloud-credentials Secret을 먼저 생성해야 합니다."
  targetResource:
    apiVersion: oadp.openshift.io/v1alpha1
    kind: DataProtectionApplication
  yaml: |
    # =============================================================================
    # [Console YAML Sample] DataProtectionApplication (OADP)
    # OpenShift Console > + 버튼 (Import YAML) 에서 붙여넣기 후 사용
    # 참조 변수: MINIO_BUCKET=${MINIO_BUCKET}, MINIO_ENDPOINT=${MINIO_ENDPOINT}
    #
    # 사전 준비: cloud-credentials Secret 생성
    #   oc create secret generic cloud-credentials \
    #     --from-literal=cloud="[default]
    #   aws_access_key_id=${MINIO_ACCESS_KEY}
    #   aws_secret_access_key=${MINIO_SECRET_KEY}" \
    #     -n openshift-adp
    # =============================================================================
    apiVersion: oadp.openshift.io/v1alpha1
    kind: DataProtectionApplication
    metadata:
      name: velero-sample
      namespace: openshift-adp
    spec:
      backupLocations:
        - name: velero-sample-1
          velero:
            provider: aws
            default: true
            objectStorage:
              bucket: ${MINIO_BUCKET}
              prefix: velero
            config:
              s3Url: ${MINIO_ENDPOINT}
              region: us-east-1
              insecureSkipTLSVerify: "true"
              s3ForcePathStyle: "true"
            credential:
              name: cloud-credentials
              key: cloud
      configuration:
        velero:
          defaultPlugins:
            - aws
            - openshift
            - csi
          featureFlags:
            - EnableCSIVolumeSnapshots
        nodeAgent:
          enable: false
          uploaderType: kopia
