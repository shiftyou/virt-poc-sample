# =============================================================================
# VirtualMachineSnapshot - VM 스냅샷 생성
# VM이 실행 중이어도 스냅샷 생성이 가능합니다. (온라인 스냅샷)
# VM 중지 상태에서는 더 안정적인 스냅샷을 얻을 수 있습니다.
#
# 적용: oc apply -f vm-snapshot.yaml
# =============================================================================
apiVersion: snapshot.kubevirt.io/v1beta1
kind: VirtualMachineSnapshot
metadata:
  name: test-vm-snapshot
  namespace: poc-vm-snapshot
spec:
  # 스냅샷할 VM 이름
  source:
    apiGroup: kubevirt.io
    kind: VirtualMachine
    name: test-snapshot-vm
  # 스냅샷 보존 정책 (선택사항)
  # deletionPolicy: OnVMDelete  # VM 삭제 시 스냅샷도 삭제
  # deletionPolicy: ""          # VM 삭제 후에도 스냅샷 유지 (기본값)
