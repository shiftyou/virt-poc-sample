# =============================================================================
# OpenShift Update Service (OSUS / Cincinnati) deployment
#
# When OSUS provides a local upgrade graph, the upgrade button appears in the console.
#
# Replace REGISTRY_HOST with the actual internal registry address before applying.
# Example: sed -i 's|REGISTRY_HOST|registry.example.com|g' update-service.yaml
# =============================================================================

---
# 1. Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: openshift-update-service
  annotations:
    openshift.io/node-selector: ""
  labels:
    openshift.io/cluster-monitoring: "true"

---
# 2. OperatorGroup
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: update-service-operator-group
  namespace: openshift-update-service
spec:
  targetNamespaces:
    - openshift-update-service

---
# 3. Subscription (install OSUS operator via OLM)
#    In airgap environments, the redhat-operators CatalogSource must be mirrored
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: update-service-subscription
  namespace: openshift-update-service
spec:
  channel: v1
  name: cincinnati-operator
  source: redhat-operators
  sourceNamespace: openshift-marketplace

---
# 4. UpdateService CR
#    - releases: path to the release-images repository mirrored by oc-mirror
#    - graphDataImage: graph data image generated by oc-mirror
#      (verify actual path from the UpdateService section of oc-mirror output)
apiVersion: updateservice.operator.openshift.io/v1
kind: UpdateService
metadata:
  name: service
  namespace: openshift-update-service
spec:
  replicas: 2
  releases: REGISTRY_HOST/ocp4/openshift/release-images
  graphDataImage: REGISTRY_HOST/ocp4/openshift/graph-image:latest
