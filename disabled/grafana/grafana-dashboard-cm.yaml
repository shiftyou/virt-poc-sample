# =============================================================================
# Grafana VM 모니터링 대시보드 ConfigMap
# OpenShift Virtualization VM의 CPU, Memory, Network, Storage 메트릭을 시각화합니다.
#
# 적용: oc apply -f grafana-dashboard-cm.yaml
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-vm-dashboard
  namespace: poc-grafana
  labels:
    app: grafana
    # Grafana가 자동으로 대시보드를 로드하도록 하는 레이블
    grafana_dashboard: "1"
data:
  vm-dashboard.json: |
    {
      "title": "OpenShift Virtualization VM 모니터링",
      "uid": "ocp-virt-vm",
      "timezone": "browser",
      "schemaVersion": 27,
      "panels": [
        {
          "id": 1,
          "title": "실행 중인 VM 수",
          "type": "stat",
          "gridPos": {"x": 0, "y": 0, "w": 6, "h": 4},
          "targets": [
            {
              "expr": "count(kubevirt_vmi_phase_count{phase=\"Running\"}) or vector(0)",
              "legendFormat": "Running VMs"
            }
          ]
        },
        {
          "id": 2,
          "title": "VM CPU 사용률 (코어)",
          "type": "graph",
          "gridPos": {"x": 0, "y": 4, "w": 12, "h": 8},
          "targets": [
            {
              "expr": "rate(kubevirt_vmi_cpu_usage_seconds_total[5m])",
              "legendFormat": "{{name}} - {{namespace}}"
            }
          ]
        },
        {
          "id": 3,
          "title": "VM 메모리 사용량 (바이트)",
          "type": "graph",
          "gridPos": {"x": 12, "y": 4, "w": 12, "h": 8},
          "targets": [
            {
              "expr": "kubevirt_vmi_memory_used_bytes",
              "legendFormat": "{{name}} - {{namespace}}"
            }
          ]
        },
        {
          "id": 4,
          "title": "VM 네트워크 수신 (bps)",
          "type": "graph",
          "gridPos": {"x": 0, "y": 12, "w": 12, "h": 8},
          "targets": [
            {
              "expr": "rate(kubevirt_vmi_network_receive_bytes_total[5m]) * 8",
              "legendFormat": "{{name}} - {{interface}}"
            }
          ]
        },
        {
          "id": 5,
          "title": "VM 네트워크 송신 (bps)",
          "type": "graph",
          "gridPos": {"x": 12, "y": 12, "w": 12, "h": 8},
          "targets": [
            {
              "expr": "rate(kubevirt_vmi_network_transmit_bytes_total[5m]) * 8",
              "legendFormat": "{{name}} - {{interface}}"
            }
          ]
        },
        {
          "id": 6,
          "title": "VM 디스크 읽기 (Bps)",
          "type": "graph",
          "gridPos": {"x": 0, "y": 20, "w": 12, "h": 8},
          "targets": [
            {
              "expr": "rate(kubevirt_vmi_storage_read_traffic_bytes_total[5m])",
              "legendFormat": "{{name}} - {{drive}}"
            }
          ]
        },
        {
          "id": 7,
          "title": "VM 디스크 쓰기 (Bps)",
          "type": "graph",
          "gridPos": {"x": 12, "y": 20, "w": 12, "h": 8},
          "targets": [
            {
              "expr": "rate(kubevirt_vmi_storage_write_traffic_bytes_total[5m])",
              "legendFormat": "{{name}} - {{drive}}"
            }
          ]
        },
        {
          "id": 8,
          "title": "노드별 VM 분포",
          "type": "bargauge",
          "gridPos": {"x": 0, "y": 28, "w": 24, "h": 6},
          "targets": [
            {
              "expr": "count by (node) (kubevirt_vmi_phase_count{phase=\"Running\"})",
              "legendFormat": "{{node}}"
            }
          ]
        }
      ],
      "refresh": "30s",
      "time": {"from": "now-1h", "to": "now"}
    }
