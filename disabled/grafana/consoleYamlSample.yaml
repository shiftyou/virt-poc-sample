apiVersion: console.openshift.io/v1
kind: ConsoleYAMLSample
metadata:
  name: poc-grafana-credentials
spec:
  title: "POC Grafana Admin Credentials"
  description: "Grafana 관리자 인증 정보 Secret입니다. rendered/01-environment/grafana/grafana-deploy.yaml을 직접 적용하면 자동으로 생성됩니다."
  targetResource:
    apiVersion: v1
    kind: Secret
  yaml: |
    # =============================================================================
    # [Console YAML Sample] Grafana Admin Secret
    # OpenShift Console > + 버튼 (Import YAML) 에서 붙여넣기 후 사용
    # 참조 변수: GRAFANA_ADMIN_PASS=${GRAFANA_ADMIN_PASS}
    # =============================================================================
    apiVersion: v1
    kind: Secret
    metadata:
      name: grafana-admin-credentials
      namespace: poc-grafana
    type: Opaque
    stringData:
      admin-user: admin
      admin-password: "${GRAFANA_ADMIN_PASS}"
