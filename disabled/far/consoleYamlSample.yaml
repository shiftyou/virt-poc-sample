apiVersion: console.openshift.io/v1
kind: ConsoleYAMLSample
metadata:
  name: poc-far-template
spec:
  title: "POC Fence Agents Remediation Template"
  description: "IPMI(${FENCE_AGENT_IP})를 통한 노드 Fencing 설정입니다. 노드 장애 시 물리 서버를 자동으로 재시작합니다. nodeparameters의 노드 이름을 실제 환경에 맞게 수정하세요."
  targetResource:
    apiVersion: fence-agents-remediation.medik8s.io/v1alpha1
    kind: FenceAgentsRemediationTemplate
  yaml: |
    # =============================================================================
    # [Console YAML Sample] FenceAgentsRemediationTemplate
    # OpenShift Console > + 버튼 (Import YAML) 에서 붙여넣기 후 사용
    # 참조 변수: FENCE_AGENT_IP=${FENCE_AGENT_IP}, FENCE_AGENT_USER=${FENCE_AGENT_USER}
    # =============================================================================
    apiVersion: fence-agents-remediation.medik8s.io/v1alpha1
    kind: FenceAgentsRemediationTemplate
    metadata:
      name: fence-agents-remediation-template
      namespace: openshift-workload-availability
    spec:
      template:
        spec:
          agent: fence_ipmilan
          sharedparameters:
            --ip: "${FENCE_AGENT_IP}"
            --username: "${FENCE_AGENT_USER}"
            --password: "${FENCE_AGENT_PASS}"
            --lanplus: ""
            --action: "reboot"
          nodeparameters:
            worker-0:
              --ipport: "623"
            worker-1:
              --ipport: "623"
            worker-2:
              --ipport: "623"
