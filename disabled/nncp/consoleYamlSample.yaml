apiVersion: console.openshift.io/v1
kind: ConsoleYAMLSample
metadata:
  name: poc-nncp-bridge
spec:
  title: "POC NNCP Linux Bridge"
  description: "모든 워커 노드에 Linux Bridge(${BRIDGE_NAME})를 생성합니다. ${BRIDGE_INTERFACE} 인터페이스를 브리지 포트로 사용합니다."
  targetResource:
    apiVersion: nmstate.io/v1
    kind: NodeNetworkConfigurationPolicy
  yaml: |
    # =============================================================================
    # [Console YAML Sample] NodeNetworkConfigurationPolicy - Linux Bridge
    # OpenShift Console > + 버튼 (Import YAML) 에서 붙여넣기 후 사용
    # 참조 변수: BRIDGE_NAME=${BRIDGE_NAME}, BRIDGE_INTERFACE=${BRIDGE_INTERFACE}
    # =============================================================================
    apiVersion: nmstate.io/v1
    kind: NodeNetworkConfigurationPolicy
    metadata:
      name: poc-bridge-nncp
    spec:
      nodeSelector:
        node-role.kubernetes.io/worker: ""
      desiredState:
        interfaces:
          - name: ${BRIDGE_NAME}
            description: "POC VM용 Linux Bridge (${BRIDGE_INTERFACE} 기반)"
            type: linux-bridge
            state: up
            ipv4:
              enabled: false
            ipv6:
              enabled: false
            bridge:
              options:
                stp:
                  enabled: false
              port:
                - name: ${BRIDGE_INTERFACE}
