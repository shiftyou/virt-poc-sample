# =============================================================================
# NodeNetworkConfigurationPolicy - Linux Bridge 생성
# 노드의 물리 인터페이스 위에 Linux Bridge를 생성합니다.
# VM이 이 Bridge를 통해 물리 네트워크에 직접 연결됩니다.
#
# 참조 변수: BRIDGE_NAME, BRIDGE_INTERFACE (env.conf)
# 적용: envsubst < nncp-bridge.yaml | oc apply -f -
# =============================================================================
apiVersion: nmstate.io/v1
kind: NodeNetworkConfigurationPolicy
metadata:
  # NNCP 이름
  name: poc-bridge-nncp
spec:
  # 모든 워커 노드에 적용 (nodeSelector 없으면 전체 노드)
  # 특정 노드에만 적용하려면 nodeSelector 사용:
  # nodeSelector:
  #   kubernetes.io/hostname: worker-0
  nodeSelector:
    node-role.kubernetes.io/worker: ""
  desiredState:
    interfaces:
      # Linux Bridge 인터페이스 정의
      - name: ${BRIDGE_NAME}
        description: "POC VM용 Linux Bridge (${BRIDGE_INTERFACE} 기반)"
        type: linux-bridge
        state: up
        # Bridge에는 IP를 할당하지 않음 (VM이 직접 IP 관리)
        ipv4:
          enabled: false
        ipv6:
          enabled: false
        bridge:
          options:
            # STP(Spanning Tree Protocol) 비활성화 (VM 환경에서 권장)
            stp:
              enabled: false
          port:
            # 물리 인터페이스를 Bridge 포트로 추가
            - name: ${BRIDGE_INTERFACE}
