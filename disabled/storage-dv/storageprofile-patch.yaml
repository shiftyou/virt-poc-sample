# =============================================================================
# StorageProfile 설정
# 스토리지 클래스의 기본 접근 모드와 볼륨 모드를 설정합니다.
# CDI가 DataVolume 생성 시 이 설정을 자동으로 참조합니다.
#
# 적용: oc apply -f storageprofile-patch.yaml
# =============================================================================
apiVersion: cdi.kubevirt.io/v1beta1
kind: StorageProfile
metadata:
  # 스토리지 클래스 이름과 동일해야 함
  name: ocs-storagecluster-ceph-rbd-virtualization
spec:
  claimPropertySets:
    # VM 라이브 마이그레이션을 위한 설정 (ReadWriteMany + Block)
    - accessModes:
        - ReadWriteMany
      volumeMode: Block
    # 단일 노드 VM용 설정 (ReadWriteOnce + Filesystem)
    - accessModes:
        - ReadWriteOnce
      volumeMode: Filesystem
