# =============================================================================
# NodeHealthCheck (NHC) - 노드 상태 감지 및 복구 트리거
#
# NHC가 워커 노드의 Ready 조건을 모니터링하다가 비정상 감지 시
# SelfNodeRemediationTemplate을 통해 SNR이 자동으로 복구를 수행합니다.
#
# 의존성: SNR Operator + NHC Operator 설치 필요
# 적용: oc apply -f nhc-config.yaml
# =============================================================================
apiVersion: remediation.medik8s.io/v1alpha1
kind: NodeHealthCheck
metadata:
  name: node-health-check
spec:
  # 모니터링 대상: 워커 노드 전체
  selector:
    matchExpressions:
      - key: node-role.kubernetes.io/worker
        operator: Exists

  # 비정상 판단 조건
  unhealthyConditions:
    # Ready=False 가 5분 이상 지속되면 비정상
    - type: Ready
      status: "False"
      duration: 300s
    # Ready=Unknown (API 서버 연결 끊김) 이 5분 이상 지속되면 비정상
    - type: Ready
      status: Unknown
      duration: 300s

  # 복구 템플릿: SNR 사용
  # FAR으로 변경하려면 apiVersion/kind/name 을 FAR template으로 교체
  remediationTemplate:
    apiVersion: self-node-remediation.medik8s.io/v1alpha1
    kind: SelfNodeRemediationTemplate
    name: self-node-remediation-template
    namespace: openshift-workload-availability

  # 동시 복구 허용 최대 노드 수 (기본값: 클러스터 크기의 28%)
  # maxUnhealthy: "28%"

  # 최소 정상 노드 비율 유지 (이 비율 미만으로 떨어지면 복구 일시 중단)
  # minHealthy: "51%"
