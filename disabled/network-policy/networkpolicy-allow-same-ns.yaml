# =============================================================================
# NetworkPolicy - Allow Same Namespace
#
# 동일 네임스페이스 내 Pod/VM 간 통신을 허용합니다.
# Deny-All 정책 적용 후 같은 네임스페이스 안에서만 통신 가능하도록 설정합니다.
#
# 적용: oc apply -f networkpolicy-allow-same-ns.yaml
# =============================================================================

# poc-network-policy1 - 동일 네임스페이스 Ingress 허용
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-same-namespace
  namespace: poc-network-policy1
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
  egress:
    - to:
        - podSelector: {}
    # DNS 허용 (kube-dns)
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP

---

# poc-network-policy2 - 동일 네임스페이스 Ingress 허용
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-same-namespace
  namespace: poc-network-policy2
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
  egress:
    - to:
        - podSelector: {}
    # DNS 허용 (kube-dns)
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
