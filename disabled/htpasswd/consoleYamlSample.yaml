apiVersion: console.openshift.io/v1
kind: ConsoleYAMLSample
metadata:
  name: poc-htpasswd-oauth
spec:
  title: "POC HTPasswd OAuth Identity Provider"
  description: "htpasswd를 사용하여 로컬 사용자 인증을 구성합니다. 적용 전 openshift-config 네임스페이스에 htpasswd-secret Secret을 먼저 생성해야 합니다."
  targetResource:
    apiVersion: config.openshift.io/v1
    kind: OAuth
  yaml: |
    # =============================================================================
    # [Console YAML Sample] HTPasswd OAuth Identity Provider
    # OpenShift Console > + 버튼 (Import YAML) 에서 붙여넣기 후 사용
    #
    # 사전 준비: htpasswd Secret 생성
    #   htpasswd -c -B -b users.htpasswd <admin> <password>
    #   htpasswd -B -b users.htpasswd <user> <password>
    #   oc create secret generic htpasswd-secret \
    #     --from-file=htpasswd=./users.htpasswd -n openshift-config
    # =============================================================================
    apiVersion: config.openshift.io/v1
    kind: OAuth
    metadata:
      name: cluster
    spec:
      identityProviders:
        - name: htpasswd_provider
          mappingMethod: claim
          type: HTPasswd
          htpasswd:
            fileData:
              name: htpasswd-secret
