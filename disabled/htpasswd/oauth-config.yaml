# OAuth IdentityProvider 설정
# htpasswd를 사용하여 로컬 사용자 인증을 구성합니다.
# 참조 변수: env.conf (envsubst로 치환)
#
# 적용: envsubst < oauth-config.yaml | oc apply -f -
apiVersion: config.openshift.io/v1
kind: OAuth
metadata:
  name: cluster
spec:
  identityProviders:
    - name: htpasswd_provider
      mappingMethod: claim
      type: HTPasswd
      htpasswd:
        fileData:
          # openshift-config 네임스페이스의 htpasswd Secret 참조
          name: htpasswd-secret
