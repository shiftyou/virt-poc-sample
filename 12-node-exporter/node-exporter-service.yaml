kind: Service
apiVersion: v1
metadata:
  name: node-exporter-service
  namespace: poscodx4
  labels:
    servicetype: metrics
spec:
  ipFamilies:
    - IPv4
  ports:
    - name: metric
      protocol: TCP
      port: 9100
      targetPort: 9100
  internalTrafficPolicy: Cluster
  type: ClusterIP
  ipFamilyPolicy: SingleStack
  sessionAffinity: None
  selector:
    monitor: metrics
