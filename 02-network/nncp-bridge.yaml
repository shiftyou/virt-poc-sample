# =============================================================================
# NodeNetworkConfigurationPolicy - Linux Bridge 생성
# 노드의 물리 인터페이스 위에 Linux Bridge를 생성합니다.
# VM이 이 Bridge를 통해 물리 네트워크에 직접 연결됩니다.
#
# 참조 변수: BRIDGE_NAME, BRIDGE_INTERFACE (env.conf)
# =============================================================================
apiVersion: nmstate.io/v1
kind: NodeNetworkConfigurationPolicy
metadata:
  name: poc-bridge-nncp
spec:
  # 모든 워커 노드에 적용
  nodeSelector:
    node-role.kubernetes.io/worker: ""
  desiredState:
    interfaces:
      - name: ${BRIDGE_NAME}
        description: "POC VM용 Linux Bridge (${BRIDGE_INTERFACE} 기반)"
        type: linux-bridge
        state: up
        ipv4:
          enabled: false
        ipv6:
          enabled: false
        bridge:
          options:
            stp:
              enabled: false
          port:
            - name: ${BRIDGE_INTERFACE}
