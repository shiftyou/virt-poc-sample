# =============================================================================
# NetworkAttachmentDefinition - Linux Bridge 기반 보조 네트워크
# NNCP로 생성된 Linux Bridge를 VM이 사용할 수 있도록 정의합니다.
#
# 참조 변수: BRIDGE_NAME, NAD_NAMESPACE (env.conf)
# =============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: ${NAD_NAMESPACE}
  labels:
    app: poc-nad

---

apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: poc-bridge-nad
  namespace: ${NAD_NAMESPACE}
  annotations:
    k8s.v1.cni.cncf.io/resourceName: bridge.network.kubevirt.io/${BRIDGE_NAME}
spec:
  config: '{
    "cniVersion": "0.3.1",
    "name": "poc-bridge-nad",
    "type": "cnv-bridge",
    "bridge": "${BRIDGE_NAME}",
    "macspoofchk": true,
    "ipam": {}
  }'
