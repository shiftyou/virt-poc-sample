apiVersion: console.openshift.io/v1
kind: ConsoleYAMLSample
metadata:
  name: poc-bridge-nad
spec:
  title: "POC Linux Bridge NAD 등록"
  description: "NNCP로 생성된 Linux Bridge를 VM 보조 네트워크로 등록합니다. NNCP(poc-bridge-nncp)가 Available 상태인 후 적용하세요. 등록 후 VM 생성 시 'Network interfaces'에서 선택할 수 있습니다."
  targetResource:
    apiVersion: k8s.cni.cncf.io/v1
    kind: NetworkAttachmentDefinition
  yaml: |
    # =============================================================================
    # [Console YAML Sample] Linux Bridge NetworkAttachmentDefinition 등록
    # OpenShift Console > + 버튼 (Import YAML) 에서 붙여넣기 후 사용
    #
    # NNCP(poc-bridge-nncp) Available 확인 후 이 NAD를 생성하세요.
    # bridge 값은 NNCP에서 생성한 Linux Bridge 이름과 일치해야 합니다.
    # =============================================================================
    apiVersion: k8s.cni.cncf.io/v1
    kind: NetworkAttachmentDefinition
    metadata:
      name: poc-bridge-nad
      namespace: poc-vm-management
      annotations:
        k8s.v1.cni.cncf.io/resourceName: bridge.network.kubevirt.io/${BRIDGE_NAME}
    spec:
      config: '{"cniVersion":"0.3.1","name":"poc-bridge-nad","type":"cnv-bridge","bridge":"${BRIDGE_NAME}","macspoofchk":true,"ipam":{}}'
