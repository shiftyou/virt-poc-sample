apiVersion: console.openshift.io/v1
kind: ConsoleYAMLSample
metadata:
  name: poc-bridge-nncp
spec:
  title: "POC Linux Bridge NNCP 생성"
  description: "워커 노드에 Linux Bridge를 생성합니다. 물리 NIC(BRIDGE_INTERFACE)을 Bridge 포트로 연결하여 VM이 물리 네트워크에 직접 연결될 수 있도록 합니다. 적용 전 노드의 실제 NIC 이름을 확인하세요."
  targetResource:
    apiVersion: nmstate.io/v1
    kind: NodeNetworkConfigurationPolicy
  yaml: |
    # =============================================================================
    # [Console YAML Sample] Linux Bridge NNCP 생성
    # OpenShift Console > + 버튼 (Import YAML) 에서 붙여넣기 후 사용
    #
    # 적용 전 아래 값을 환경에 맞게 수정하세요.
    #   - interfaces[0].name       : 생성할 Bridge 이름 (env.conf BRIDGE_NAME, 예: br-flat)
    #   - interfaces[0].bridge.port: 물리 NIC 이름    (env.conf BRIDGE_INTERFACE, 예: enp3s0)
    # =============================================================================
    apiVersion: nmstate.io/v1
    kind: NodeNetworkConfigurationPolicy
    metadata:
      name: poc-bridge-nncp
    spec:
      desiredState:
        interfaces:
          - bridge:
              options:
                stp:
                  enabled: false
              port:
                - name: enp3s0
            description: Linux bridge with enp3s0 as a port
            ipv4:
              dhcp: false
              enabled: false
            name: br-flat
            state: up
            type: linux-bridge
      nodeSelector:
        node-role.kubernetes.io/worker: ''
