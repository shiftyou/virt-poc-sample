apiVersion: console.openshift.io/v1
kind: ConsoleYAMLSample
metadata:
  name: poc-kubedescheduler
spec:
  title: "POC KubeDescheduler"
  description: "클러스터의 Pod 분배를 자동으로 최적화하는 Descheduler 설정입니다. 1시간마다 실행되며 Affinity, Topology, Lifecycle 기반 재스케줄링을 수행합니다."
  targetResource:
    apiVersion: operator.openshift.io/v1
    kind: KubeDescheduler
  yaml: |
    # =============================================================================
    # [Console YAML Sample] KubeDescheduler
    # OpenShift Console > + 버튼 (Import YAML) 에서 붙여넣기 후 사용
    # =============================================================================
    apiVersion: operator.openshift.io/v1
    kind: KubeDescheduler
    metadata:
      name: cluster
      namespace: openshift-kube-descheduler-operator
    spec:
      deschedulingIntervalSeconds: 3600
      profiles:
        - AffinityAndTaints
        - TopologyAndDuplicates
        - LifecycleAndUtilization
      profileCustomizations:
        thresholdPriorityClassName: "system-cluster-critical"
        podLifetime: 24h
