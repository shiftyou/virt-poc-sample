# =============================================================================
# 라이브 마이그레이션 테스트용 VM
# ReadWriteMany(RWX) 스토리지를 사용해야 라이브 마이그레이션이 가능합니다.
#
# 적용: oc apply -f test-vm.yaml
# =============================================================================
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: test-migration-vm
  namespace: poc-live-migration
  labels:
    app: test-migration-vm
spec:
  running: false
  template:
    metadata:
      labels:
        kubevirt.io/domain: test-migration-vm
    spec:
      domain:
        cpu:
          cores: 1
          sockets: 1
          threads: 1
        devices:
          disks:
            - name: rootdisk
              disk:
                bus: virtio
            - name: cloudinitdisk
              disk:
                bus: virtio
          interfaces:
            - name: default
              masquerade: {}
        resources:
          requests:
            memory: 1Gi
      # 라이브 마이그레이션 설정
      # evictionStrategy: LiveMigrate - 노드 drain 시 VM을 마이그레이션
      evictionStrategy: LiveMigrate
      networks:
        - name: default
          pod: {}
      volumes:
        - name: rootdisk
          dataVolume:
            name: test-migration-vm-rootdisk
        - name: cloudinitdisk
          cloudInitNoCloud:
            userData: |
              #cloud-config
              user: fedora
              password: fedora123
              chpasswd: { expire: False }
  dataVolumeTemplates:
    - apiVersion: cdi.kubevirt.io/v1beta1
      kind: DataVolume
      metadata:
        name: test-migration-vm-rootdisk
      spec:
        sourceRef:
          kind: DataSource
          name: fedora
          namespace: openshift-virtualization-os-images
        storage:
          resources:
            requests:
              storage: 20Gi
          # 라이브 마이그레이션을 위해 RWX 스토리지 클래스 사용
          # ODF를 사용하는 경우 ocs-storagecluster-ceph-rbd-virtualization (RWX 지원)
          storageClassName: ocs-storagecluster-ceph-rbd-virtualization
          accessModes:
            - ReadWriteMany
