# =============================================================================
# [Console YAML Sample] LimitRange + ResourceQuota
# OpenShift Console > + 버튼 (Import YAML) 에서 붙여넣기 후 사용
# =============================================================================
apiVersion: v1
kind: LimitRange
metadata:
  name: poc-limitrange
  namespace: poc-resource-limits
spec:
  limits:
    - type: Container
      default:
        cpu: "500m"
        memory: "256Mi"
      defaultRequest:
        cpu: "100m"
        memory: "128Mi"
      max:
        cpu: "4"
        memory: "4Gi"
      min:
        cpu: "50m"
        memory: "64Mi"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: poc-quota
  namespace: poc-resource-limits
spec:
  hard:
    requests.cpu: "8"
    limits.cpu: "16"
    requests.memory: "8Gi"
    limits.memory: "16Gi"
    pods: "20"
