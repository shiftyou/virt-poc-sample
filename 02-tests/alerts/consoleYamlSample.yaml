apiVersion: console.openshift.io/v1
kind: ConsoleYAMLSample
metadata:
  name: poc-vm-prometheusrule
spec:
  title: "POC VM PrometheusRule Alert"
  description: "VM CPU, Memory, 상태 이상을 감지하는 Alert 규칙입니다. poc-alerts 네임스페이스에 적용됩니다."
  targetResource:
    apiVersion: monitoring.coreos.com/v1
    kind: PrometheusRule
  yaml: |
    # =============================================================================
    # [Console YAML Sample] PrometheusRule - VM Alert
    # OpenShift Console > + 버튼 (Import YAML) 에서 붙여넣기 후 사용
    # =============================================================================
    apiVersion: monitoring.coreos.com/v1
    kind: PrometheusRule
    metadata:
      name: poc-vm-alerts
      namespace: poc-alerts
      labels:
        role: alert-rules
    spec:
      groups:
        - name: poc-vm-status
          interval: 30s
          rules:
            - alert: VMPendingTooLong
              expr: kubevirt_vmi_phase_count{phase="Pending"} > 0
              for: 5m
              labels:
                severity: warning
              annotations:
                summary: "VM이 5분 이상 Pending 상태입니다"
                description: "VM {{ $labels.name }}이 Pending 상태입니다."
            - alert: VMHighCPUUsage
              expr: rate(kubevirt_vmi_cpu_usage_seconds_total[5m]) > 0.9
              for: 5m
              labels:
                severity: warning
              annotations:
                summary: "VM CPU 사용률 90% 초과"
                description: "VM {{ $labels.name }} CPU: {{ $value | humanizePercentage }}"
            - alert: VMHighMemoryUsage
              expr: kubevirt_vmi_memory_used_bytes / kubevirt_vmi_memory_available_bytes > 0.9
              for: 5m
              labels:
                severity: warning
              annotations:
                summary: "VM 메모리 사용률 90% 초과"
                description: "VM {{ $labels.name }} 메모리: {{ $value | humanizePercentage }}"
