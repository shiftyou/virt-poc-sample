# =============================================================================
# VM 스냅샷 테스트용 VM
#
# 적용: oc apply -f test-vm.yaml
# =============================================================================
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: test-snapshot-vm
  namespace: poc-vm-snapshot
  labels:
    app: test-snapshot-vm
spec:
  running: false
  template:
    metadata:
      labels:
        kubevirt.io/domain: test-snapshot-vm
    spec:
      domain:
        cpu:
          cores: 1
        devices:
          disks:
            - name: rootdisk
              disk:
                bus: virtio
            - name: cloudinitdisk
              disk:
                bus: virtio
          interfaces:
            - name: default
              masquerade: {}
        resources:
          requests:
            memory: 1Gi
      networks:
        - name: default
          pod: {}
      volumes:
        - name: rootdisk
          dataVolume:
            name: test-snapshot-vm-rootdisk
        - name: cloudinitdisk
          cloudInitNoCloud:
            userData: |
              #cloud-config
              user: fedora
              password: fedora123
              chpasswd: { expire: False }
  dataVolumeTemplates:
    - apiVersion: cdi.kubevirt.io/v1beta1
      kind: DataVolume
      metadata:
        name: test-snapshot-vm-rootdisk
      spec:
        sourceRef:
          kind: DataSource
          name: fedora
          namespace: openshift-virtualization-os-images
        storage:
          resources:
            requests:
              storage: 20Gi
