apiVersion: console.openshift.io/v1
kind: ConsoleYAMLSample
metadata:
  name: poc-vm-snapshot
spec:
  title: "POC VirtualMachineSnapshot"
  description: "test-snapshot-vm의 스냅샷을 생성합니다. VM이 실행 중이어도 온라인 스냅샷이 가능하며, 중지 상태에서는 더 안정적인 스냅샷을 얻을 수 있습니다."
  targetResource:
    apiVersion: snapshot.kubevirt.io/v1beta1
    kind: VirtualMachineSnapshot
  yaml: |
    # =============================================================================
    # [Console YAML Sample] VirtualMachineSnapshot
    # OpenShift Console > + 버튼 (Import YAML) 에서 붙여넣기 후 사용
    # VM이 실행 중이어도 온라인 스냅샷 생성이 가능합니다.
    # =============================================================================
    apiVersion: snapshot.kubevirt.io/v1beta1
    kind: VirtualMachineSnapshot
    metadata:
      name: test-vm-snapshot
      namespace: poc-vm-snapshot
    spec:
      source:
        apiGroup: kubevirt.io
        kind: VirtualMachine
        name: test-snapshot-vm
