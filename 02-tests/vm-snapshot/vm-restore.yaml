# =============================================================================
# VirtualMachineRestore - VM 스냅샷 복원
# 스냅샷에서 VM을 복원합니다.
# 복원 전에 VM을 중지(running: false) 상태로 변경해야 합니다.
#
# 사전 조건:
#   oc patch vm test-snapshot-vm -n poc-vm-snapshot \
#     --type merge -p '{"spec":{"running":false}}'
#
# 적용: oc apply -f vm-restore.yaml
# =============================================================================
apiVersion: snapshot.kubevirt.io/v1beta1
kind: VirtualMachineRestore
metadata:
  name: test-vm-restore
  namespace: poc-vm-snapshot
spec:
  # 복원 대상 VM
  target:
    apiGroup: kubevirt.io
    kind: VirtualMachine
    name: test-snapshot-vm
  # 복원에 사용할 스냅샷
  virtualMachineSnapshotName: test-vm-snapshot
