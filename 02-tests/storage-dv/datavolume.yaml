# =============================================================================
# DataVolume - VM 디스크 볼륨 생성
# Red Hat 기본 이미지(DataSource)에서 DataVolume을 생성합니다.
#
# 적용: oc apply -f datavolume.yaml
# =============================================================================
apiVersion: cdi.kubevirt.io/v1beta1
kind: DataVolume
metadata:
  name: fedora-dv
  namespace: poc-storage-dv
  labels:
    app: poc-storage-dv
  annotations:
    # 임포트 진행률 표시
    cdi.kubevirt.io/storage.import.requiresScratch: "true"
spec:
  # 소스: openshift-virtualization-os-images의 DataSource 참조
  sourceRef:
    kind: DataSource
    # Fedora 기본 이미지 사용
    name: fedora
    namespace: openshift-virtualization-os-images
  storage:
    resources:
      requests:
        # 볼륨 크기 (기본 이미지보다 크게 설정)
        storage: 20Gi
    # 스토리지 클래스 (환경에 맞게 수정)
    # storageClassName: ocs-storagecluster-ceph-rbd-virtualization
    accessModes:
      - ReadWriteOnce

---

# RHEL 9 DataVolume 예제
apiVersion: cdi.kubevirt.io/v1beta1
kind: DataVolume
metadata:
  name: rhel9-dv
  namespace: poc-storage-dv
spec:
  sourceRef:
    kind: DataSource
    name: rhel9
    namespace: openshift-virtualization-os-images
  storage:
    resources:
      requests:
        storage: 30Gi
    accessModes:
      - ReadWriteOnce
