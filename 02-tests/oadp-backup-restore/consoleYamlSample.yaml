apiVersion: console.openshift.io/v1
kind: ConsoleYAMLSample
metadata:
  name: poc-oadp-backup
spec:
  title: "POC OADP VM 백업"
  description: "poc-oadp-test 네임스페이스의 VM과 관련 리소스를 MinIO S3 백엔드에 백업합니다. OADP DPA(velero-sample)가 먼저 설정되어 있어야 합니다."
  targetResource:
    apiVersion: velero.io/v1
    kind: Backup
  yaml: |
    # =============================================================================
    # [Console YAML Sample] Velero Backup
    # OpenShift Console > + 버튼 (Import YAML) 에서 붙여넣기 후 사용
    # OADP DPA가 설정되어 있어야 합니다.
    # =============================================================================
    apiVersion: velero.io/v1
    kind: Backup
    metadata:
      name: test-vm-backup
      namespace: openshift-adp
    spec:
      includedNamespaces:
        - poc-oadp-test
      storageLocation: velero-sample-1
      ttl: 72h0m0s
      snapshotVolumes: true
      includedResources:
        - virtualmachines
        - virtualmachineinstances
        - datavolumes
        - persistentvolumeclaims
        - pods
        - services
        - configmaps
        - secrets
