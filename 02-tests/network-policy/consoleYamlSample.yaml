apiVersion: console.openshift.io/v1
kind: ConsoleYAMLSample
metadata:
  name: poc-network-policy
spec:
  title: "POC NetworkPolicy - Deny All + 동일 네임스페이스 허용"
  description: "poc-netpol 네임스페이스의 모든 트래픽을 기본 차단하고, 동일 네임스페이스 내 Pod 간 통신과 DNS(UDP/TCP 53)만 허용합니다."
  targetResource:
    apiVersion: networking.k8s.io/v1
    kind: NetworkPolicy
  yaml: |
    # =============================================================================
    # [Console YAML Sample] NetworkPolicy
    # OpenShift Console > + 버튼 (Import YAML) 에서 붙여넣기 후 사용
    # =============================================================================
    apiVersion: networking.k8s.io/v1
    kind: NetworkPolicy
    metadata:
      name: deny-all-ingress
      namespace: poc-netpol
    spec:
      podSelector: {}
      policyTypes:
        - Ingress
    ---
    apiVersion: networking.k8s.io/v1
    kind: NetworkPolicy
    metadata:
      name: allow-same-namespace
      namespace: poc-netpol
    spec:
      podSelector: {}
      policyTypes:
        - Ingress
        - Egress
      ingress:
        - from:
            - podSelector: {}
      egress:
        - to:
            - podSelector: {}
        - ports:
            - port: 53
              protocol: UDP
            - port: 53
              protocol: TCP
