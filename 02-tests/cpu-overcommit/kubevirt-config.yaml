# =============================================================================
# KubeVirt CPU Overcommit 설정
# VM에 할당되는 가상 CPU 수를 물리 CPU 수 대비 배수로 설정합니다.
#
# 주의: 클러스터 전체에 영향을 미치는 설정입니다.
#
# 적용: oc apply -f kubevirt-config.yaml
# 또는 patch 방식:
#   oc patch kubevirt kubevirt -n openshift-cnv --type=merge -p @kubevirt-config.yaml
# =============================================================================
apiVersion: kubevirt.io/v1
kind: KubeVirt
metadata:
  name: kubevirt
  # OpenShift Virtualization이 설치된 네임스페이스
  namespace: openshift-cnv
spec:
  configuration:
    developerConfiguration:
      # CPU Overcommit 배수 설정
      # 값: 1 (기본값, overcommit 없음) ~ N배
      # 예: 4 = 4배 overcommit (4 vCPU per 1 physical CPU)
      cpuOvercommit: 4
    # VM 기본 CPU 모드 (선택사항)
    # host-passthrough: 호스트 CPU와 동일한 모델 사용 (마이그레이션 제한)
    # host-model: 호스트와 호환되는 CPU 모델
    # custom: 사용자 지정 CPU 모델
    cpuModel: "host-passthrough"
